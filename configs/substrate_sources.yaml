# Substrate corpus manifest — source of truth for the "dual" bucket.
#
# The dual bucket is operational prerequisite substrate: networking / OS /
# architecture / web / crypto / recon mechanism knowledge that BOTH offensive and
# defensive practitioners depend on. The thesis this corpus enables is that the
# shared substrate is the locus of offense/defense entanglement (dual-use *by
# application*). Adding a source = editing this file (one entry per source unit);
# handlers in src/entanglement/substrate.py are generic per `type`.
#
# Per-entry fields:
#   id              unique source-unit id (-> data/build_reports/<id>.yaml, source_ids tag)
#   type            handler dispatch: rfc_text | pdf_single | pdf_chapter_collection
#                   | pdf_chapter_extract | github_markdown | html_book_chapters
#   source_name     human label
#   license         redistribution terms (propagated to every chunk)
#   redistributable true if the text itself can be released; false = pointer+hash only
#   density_policy  flag_only (never auto-drop on alpha-ratio; for legitimately
#                   symbol-dense sources: RFC grammars, crypto notation, arch tables)
#                   | standard (<0.5 drop, 0.5-0.7 flag, >0.7 clean)
#   chunk_strategy  structural boundary used by the handler
#   version_pin     immutable identifier(s); RFC numbers / commit SHA / download-date+checksum

sources:
  - id: rfcs
    type: rfc_text
    source_name: "IETF RFCs (core protocol specifications)"
    license: "IETF Trust / RFC Editor, BCP 78 — freely redistributable with attribution"
    redistributable: true
    density_policy: flag_only        # RFCs carry ABNF grammars, header tables, hex — symbol-dense by nature
    chunk_strategy: rfc_section
    version_pin: "RFC numbers are immutable: 9293, 1035, 8446, 9110, 4271, 4253"
    base_url: "https://www.rfc-editor.org/rfc/rfc{number}.txt"
    rfcs:
      - { number: 9293, topic: networking }   # TCP
      - { number: 1035, topic: networking }   # DNS
      - { number: 8446, topic: crypto }       # TLS 1.3  (default: topic=crypto; reversible — see METHODOLOGY)
      - { number: 9110, topic: web }          # HTTP semantics
      - { number: 4271, topic: networking }   # BGP-4
      - { number: 4253, topic: networking }   # SSH transport layer

  - id: fips197
    type: pdf_single
    source_name: "FIPS 197 — Advanced Encryption Standard (AES)"
    license: "NIST / U.S. Government work — public domain"
    redistributable: true
    density_policy: flag_only        # AES spec is hex S-boxes, state matrices, math notation
    chunk_strategy: doc_section
    topic: crypto
    min_chunk_chars: 250             # drops FIPS federal-register front-matter boilerplate + ToC/caption fragments
    version_pin: "download-date + sha256 of PDF bytes (recorded in build report)"
    url: "https://nvlpubs.nist.gov/nistpubs/FIPS/NIST.FIPS.197-upd1.pdf"

  - id: nmap_book
    type: html_book_chapters
    source_name: "Nmap Network Scanning (Lyon)"
    license: "Free-to-read online (G. Lyon); redistribution not granted — pointer+hash only"
    redistributable: false
    density_policy: flag_only          # command examples + scan output are legitimately symbol-dense
    chunk_strategy: per_page
    topic: recon
    min_chunk_chars: 250
    version_pin: "per-page download-date + sha256 of fetched HTML (recorded per chunk)"
    index_url: "https://nmap.org/book/toc.html"
    base_url: "https://nmap.org/book/{stem}.html"
    # Keep recon methodology (host discovery, port scanning, scan methods, version/OS detection,
    # NSE, firewall/IDS evasion + the dual-use "defenses against scanning" chapters). Deny front/
    # back matter, install, GUI (zenmap), man pages, and the large reference data-file dumps.
    deny_prefixes:
      [toc, preface, organization, conventions, resources, pref-rfc, acknowledgements, tcpip-ref,
       legal-issues, history-future, install, inst-, man, index, idx, app-, solution-, book-cover,
       errata, translations, authors, download, docs, nmap-dtd, nsedoc, zenmap, ndiff-man, ncat-man,
       nping-man, data-files, nmap-services, nmap-service-probes, nmap-rpc, nmap-os-db,
       nmap-mac-prefixes, nmap-protocols]

  - id: intel_sdm
    type: pdf_chapter_extract
    source_name: "Intel 64 & IA-32 SDM Vol 3A (System Programming Guide, Part 1)"
    license: "Intel © — free download, redistribution not granted — pointer+hash only"
    redistributable: false
    density_policy: flag_only          # privilege/paging tables, register-field diagrams
    chunk_strategy: doc_section
    topic: architecture
    min_chunk_chars: 250
    # Conceptual chapters only (CH2-7: architecture overview, segmentation/memory mgmt,
    # linear-address, paging, protection, interrupts/exceptions) — drops specialized/reference
    # bulk (FRED, user interrupts, task/MP mgmt, init, APIC, cache, MMX, VMX, SMM, appendices).
    # Page ranges discovered + pinned against Vol 3A getContent/671190 (sha in build report).
    version_pin: "Vol 3A (getContent/671190); conceptual CH2-7; download-date + sha256 of PDF"
    url: "https://cdrdv2.intel.com/v1/dl/getContent/671190"
    page_ranges:
      - { label: ch2-system-architecture-overview, start: 59,  end: 88 }
      - { label: ch3-protected-mode-memory-management, start: 89, end: 104 }
      - { label: ch4-linear-address-preprocessing, start: 105, end: 112 }
      - { label: ch5-paging, start: 113, end: 168 }
      - { label: ch6-protection, start: 169, end: 202 }
      - { label: ch7-interrupt-and-exception-handling, start: 203, end: 260 }

  - id: ostep
    type: pdf_chapter_collection
    source_name: "OSTEP (Operating Systems: Three Easy Pieces)"
    license: "Free-to-read (Arpaci-Dusseau); redistribution not granted — pointer+hash only"
    redistributable: false
    density_policy: flag_only         # systems code listings + diagrams are legitimately low-alpha
    chunk_strategy: doc_section
    topic: os_internals
    min_chunk_chars: 250              # drop pypdf page-header/footer fragments
    # Substantive mechanism chapters only: virtualization (cpu/vm/vmm), concurrency (threads),
    # persistence (file), distributed (dist). Excludes Socratic dialogues, front-matter, labs,
    # and the security section (kept topic-pure as os_internals; crypto covered by boneh/fips197).
    version_pin: "per-chapter download-date + sha256 (recorded per chunk)"
    base_url: "https://pages.cs.wisc.edu/~remzi/OSTEP/{stem}.pdf"
    chapters:
      - cpu-intro
      - cpu-api
      - cpu-mechanisms
      - cpu-sched
      - cpu-sched-mlfq
      - cpu-sched-lottery
      - cpu-sched-multi
      - vm-intro
      - vm-api
      - vm-mechanism
      - vm-segmentation
      - vm-freespace
      - vm-paging
      - vm-tlbs
      - vm-smalltables
      - vm-beyondphys
      - vm-beyondphys-policy
      - vm-complete
      - vmm-intro
      - threads-intro
      - threads-api
      - threads-locks
      - threads-locks-usage
      - threads-cv
      - threads-sema
      - threads-bugs
      - threads-events
      - threads-monitors
      - file-intro
      - file-devices
      - file-disks
      - file-raid
      - file-implementation
      - file-ffs
      - file-journaling
      - file-lfs
      - file-ssd
      - file-integrity
      - dist-intro
      - dist-nfs
      - dist-afs

  - id: boneh
    type: pdf_single
    source_name: "A Graduate Course in Applied Cryptography (Boneh & Shoup, v0.6)"
    license: "Free-to-read draft (Boneh/Shoup); redistribution not granted — pointer+hash only"
    redistributable: false
    density_policy: flag_only         # grad crypto text: theorems, equations, math notation
    chunk_strategy: doc_section
    topic: crypto
    min_chunk_chars: 250
    # NOTE: toc.cryptobook.us distributes ONE full-book PDF (not per-chapter PDFs as the spec
    # assumed) -> handler is pdf_single on the full v0.6 book, linked from toc.cryptobook.us.
    version_pin: "v0.6 (BonehShoup_0_6.pdf); download-date + sha256 of PDF bytes"
    url: "https://crypto.stanford.edu/~dabo/cryptobook/BonehShoup_0_6.pdf"

  - id: mdn_web_security
    type: github_markdown
    source_name: "MDN Web Docs — Web Security"
    license: "CC-BY-SA 2.5 (mdn/content)"
    redistributable: true
    density_policy: standard         # markdown prose is alpha-dense
    chunk_strategy: per_file
    topic: web
    version_pin: "git mdn/content @ HEAD sha at build (recorded in report)"
    repo: "https://github.com/mdn/content"
    subdir: "files/en-us/web/security"
